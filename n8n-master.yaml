apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-master-deployment
  namespace: hub
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-master
  template:
    metadata:
      labels:
        app: n8n-master
    spec:
      # Produção usa nodeSelector purpose=applications-od (OD nodes no AKS)
      # No kind não há esse label, removido para o lab
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.96.0.10   # CoreDNS do cluster
        searches:
          - hub.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: n8n-master
          image: n8nio/n8n:2.2.4
          ports:
            - name: web-server
              containerPort: 5678
          livenessProbe:
            httpGet:
              path: /healthz/readiness
              port: 5678
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /healthz/readiness
              port: 5678
            initialDelaySeconds: 30
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: n8n-configmap
            - secretRef:
                name: n8n-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m       # idêntico à produção
              memory: 512Mi   # reduzido para lab (produção: 900Mi)
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-master-service
  namespace: hub
spec:
  type: NodePort
  selector:
    app: n8n-master
  ports:
    - name: http-web-svc
      port: 5678
      targetPort: web-server
      nodePort: 30678
