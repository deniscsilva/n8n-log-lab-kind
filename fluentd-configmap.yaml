apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: logging
data:
  fluent.conf: |
    # Descarta logs do próprio fluentd para evitar loop
    <label @FLUENT_LOG>
      <match fluent.**>
        @type null
      </match>
    </label>

    # Lê logs de todos os containers via tail (formato CRI — containerd)
    <source>
      @type tail
      path /var/log/containers/*.log
      pos_file /var/log/fluentd-containers.log.pos
      tag kubernetes.*
      read_from_head true
      <parse>
        @type cri
      </parse>
    </source>

    # Enriquece com metadados do pod (namespace, labels, nome do pod, etc.)
    <filter kubernetes.**>
      @type kubernetes_metadata
    </filter>

    # Filtra apenas o namespace hub (onde o n8n roda)
    <filter kubernetes.**>
      @type grep
      <regexp>
        key $.kubernetes.namespace_name
        pattern ^hub$
      </regexp>
    </filter>

    # Parseia formato n8n: "TIMESTAMP | LEVEL | MESSAGE"
    # Extrai campos e aninha sob application.* para compatibilidade com legacy-*
    # Logs fora do formato são passados sem transformação (emit_invalid_record_to_error false)
    <filter kubernetes.**>
      @type parser
      key_name message
      reserve_data true
      remove_key_name_field true
      inject_key_prefix application.
      emit_invalid_record_to_error false
      <parse>
        @type regexp
        expression /^(?<timestamp>\S+) \| (?<level>\w+)\s+\| (?<message>.+)$/
      </parse>
    </filter>

    # Envia para Elasticsearch com prefixo legacy- (compatível com índices de produção)
    <match kubernetes.**>
      @type elasticsearch
      host elasticsearch.logging.svc.cluster.local
      port 9200
      scheme http
      logstash_format true
      logstash_prefix legacy
      logstash_dateformat %Y.%m.%d
      <buffer>
        @type memory
        flush_interval 5s
        chunk_limit_size 2M
        retry_max_interval 30s
        retry_forever true
      </buffer>
    </match>
