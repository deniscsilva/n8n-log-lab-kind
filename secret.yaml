apiVersion: v1
kind: Secret
metadata:
  name: n8n-secret
  namespace: hub
type: Opaque
# stringData: valores em texto puro — Kubernetes converte para base64 automaticamente
stringData:
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_PASSWORD: n8nlab123
  # Deve ter pelo menos 32 caracteres — troque antes de subir workflows reais
  N8N_ENCRYPTION_KEY: "n8n-lab-encryption-key-change-me"
