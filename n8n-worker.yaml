apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker-deployment
  namespace: hub
  labels:
    app: n8n
spec:
  replicas: 1   # produção tem 4; 1 é suficiente para lab
  selector:
    matchLabels:
      app: n8n-worker
  template:
    metadata:
      labels:
        app: n8n-worker
    spec:
      # Produção usa nodeSelector purpose=applications-od (OD nodes no AKS)
      # No kind não há esse label, removido para o lab
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.96.0.10   # CoreDNS do cluster
        searches:
          - hub.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: n8n-worker
          image: n8nio/n8n:2.2.4
          command:
            - n8n
            - worker
          # Workers não expõem porta de UI (idêntico à produção: Port: <none>)
          envFrom:
            - configMapRef:
                name: n8n-configmap
            - secretRef:
                name: n8n-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m    # produção: 980m
              memory: 1Gi  # produção: 6Gi — reduzido para lab
---
# Worker não expõe web UI, mas criado como NodePort conforme requisito do lab.
# O service existe para fins operacionais (ex: futuros health checks / métricas).
apiVersion: v1
kind: Service
metadata:
  name: n8n-worker-service
  namespace: hub
spec:
  type: NodePort
  selector:
    app: n8n-worker
  ports:
    - name: worker-port
      port: 5678
      targetPort: 5678
      nodePort: 30679
